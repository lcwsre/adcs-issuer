{{- if .Values.webhook.enabled }}
# cert-manager Certificate to generate webhook TLS certs
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "adcs-issuer.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "adcs-issuer.fullname" . }}-serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
spec:
  secretName: {{ include "adcs-issuer.fullname" . }}-webhook-tls
  dnsNames:
    - {{ include "adcs-issuer.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "adcs-issuer.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "adcs-issuer.fullname" . }}-selfsigned
{{- end }}
