# ClusterRole for cert-manager to approve ADCS issuer CertificateRequests
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "adcs-issuer.fullname" . }}-approver
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - cert-manager.io
    resources:
      - signers
    verbs:
      - approve
    resourceNames:
      - adcsissuers.adcs.certmanager.lcwsre.io/*
      - clusteradcsissuers.adcs.certmanager.lcwsre.io/*
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "adcs-issuer.fullname" . }}-approver
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "adcs-issuer.fullname" . }}-approver
subjects:
  - kind: ServiceAccount
    name: {{ .Values.certManager.serviceAccountName }}
    namespace: {{ .Values.certManager.namespace }}
