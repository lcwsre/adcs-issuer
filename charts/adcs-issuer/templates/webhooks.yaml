{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "adcs-issuer.fullname" . }}-mutating
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "adcs-issuer.fullname" . }}-serving-cert
webhooks:
  - name: adcsissuer-mutation.adcs.certmanager.lcwsre.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "adcs-issuer.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-adcs-certmanager-lcwsre-io-v1-adcsissuer
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - adcs.certmanager.lcwsre.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - adcsissuers
  - name: mclusteradcsissuer.adcs.certmanager.lcwsre.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "adcs-issuer.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-adcs-certmanager-lcwsre-io-v1-clusteradcsissuer
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - adcs.certmanager.lcwsre.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - clusteradcsissuers
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "adcs-issuer.fullname" . }}-validating
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "adcs-issuer.fullname" . }}-serving-cert
webhooks:
  - name: adcsissuer-validation.adcs.certmanager.lcwsre.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "adcs-issuer.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-adcs-certmanager-lcwsre-io-v1-adcsissuer
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - adcs.certmanager.lcwsre.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - adcsissuers
  - name: vclusteradcsissuer.adcs.certmanager.lcwsre.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "adcs-issuer.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-adcs-certmanager-lcwsre-io-v1-clusteradcsissuer
    failurePolicy: Fail
    sideEffects: None
    rules:
      - apiGroups:
          - adcs.certmanager.lcwsre.io
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - clusteradcsissuers
{{- end }}
