apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adcs-issuer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adcs-issuer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "adcs-issuer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "adcs-issuer.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "adcs-issuer.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "adcs-issuer.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "adcs-issuer.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            - --cluster-resource-namespace={{ .Release.Namespace }}
            {{- if .Values.leaderElection.enabled }}
            - --enable-leader-election
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metrics-addr={{ .Values.metrics.address }}
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . }}
            {{- end }}
          ports:
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: 8080
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
            - name: healthcheck
              containerPort: {{ .Values.healthcheck.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthcheck
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthcheck
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if .Values.webhook.enabled }}
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
          {{- if .Values.kerberos.enabled }}
            - name: krb5-conf
              mountPath: /etc/krb5.conf
              subPath: krb5.conf
              readOnly: true
          {{- end }}
      volumes:
      {{- if .Values.webhook.enabled }}
        - name: cert
          secret:
            secretName: {{ include "adcs-issuer.fullname" . }}-webhook-tls
            defaultMode: 420
      {{- end }}
      {{- if .Values.kerberos.enabled }}
        - name: krb5-conf
          configMap:
            name: {{ .Values.kerberos.krb5ConfigMapName | default (printf "%s-krb5-conf" (include "adcs-issuer.fullname" .)) }}
      {{- end }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
