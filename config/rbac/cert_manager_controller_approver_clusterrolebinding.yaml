# bind the cert-manager internal approver to approve
# adcs.certmanager.lcwsre.io CertificateRequests
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-controller-approve:adcs-certmanager-lcwsre-io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-controller-approve:adcs-certmanager-lcwsre-io
subjects:
- kind: ServiceAccount
  name: cert-manager
  namespace: cert-manager
